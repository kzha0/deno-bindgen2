[package]
name = "deno-bindgen2"
version = "0.1.0"
edition.workspace = true

[lib]
name = "deno_bindgen2"

[[bin]]
name = "deno_bindgen2"
path = "src/main.rs"

[dependencies]
deno-bindgen2-macro.workspace = true
cargo_metadata = "0.18"
clap = { version = "4.5", features = ["derive"] }
dlopen2 = "0.7"
linkme = "0.3"
ts_quote = "0.2"
